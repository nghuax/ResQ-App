<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ResQ Fixer App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;700&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      crossorigin=""
    />
    <link rel="stylesheet" href="../styles.css?v=20260424e" />
  </head>
  <body data-app-mode="fixer">
    <main class="page-shell" aria-label="ResQ fixer app">
      <div class="ambient ambient-one" aria-hidden="true"></div>
      <div class="ambient ambient-two" aria-hidden="true"></div>
      <section class="device-stage">
        <div class="phone-frame" aria-label="ResQ fixer app preview">
          <div class="status-island" aria-hidden="true"></div>
          <div id="brand-root"></div>
          <div id="screen-root" class="screen-root"></div>
          <div id="overlay-root" class="overlay-root"></div>
          <div id="nav-root"></div>
        </div>
      </section>
    </main>

    <script type="module" src="../script.js?v=20260424e"></script>
    <script>
      if (window.location.hash.includes("figmacapture=")) {
        const captureScript = document.createElement("script");
        captureScript.src = "https://mcp.figma.com/mcp/html-to-design/capture.js";
        captureScript.async = true;
        document.head.appendChild(captureScript);
      }
    </script>
  </body>
</html>
